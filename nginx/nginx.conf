load_module modules/ngx_http_modsecurity_module.so;

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile          on;
    keepalive_timeout 65;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    modsecurity              on;
    modsecurity_rules_file   /etc/modsecurity/modsecurity.conf;

    # Request body needs to be read before access_by_lua runs so the Lua
    # decision engine can hash & forward it. 64k stays in memory; larger
    # bodies spill to a temp file and are reported as truncated.
    lua_need_request_body   on;
    client_body_buffer_size 64k;
    client_max_body_size    10m;

    lua_socket_connect_timeout 500ms;
    lua_socket_send_timeout    500ms;
    lua_socket_read_timeout    500ms;
    lua_socket_pool_size       64;
    lua_socket_keepalive_timeout 10s;

    resolver 127.0.0.11 ipv6=off;
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";
    lua_shared_dict waf_cache 10m;

    upstream backend {
        server host.docker.internal:8080 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # -----------------------------------------------------------------------
    # Port 80: HTTP→HTTPS redirect. The Docker healthcheck still hits
    # /_waf/health on plain HTTP, so that one path is preserved here and
    # must NOT be moved into the redirect.
    # -----------------------------------------------------------------------
    server {
        listen 80 default_server;
        server_name _;

        # Health probe — kept on plain HTTP so the Docker healthcheck
        # (and any external L4 probe) doesn't need a CA bundle.
        location = /_waf/health {
            access_log off;
            modsecurity off;
            default_type application/json;
            return 200 '{"status":"ok"}';
        }

        # Everything else: bounce to HTTPS. modsecurity off — the request
        # is going to be re-evaluated on the TLS side anyway.
        location / {
            modsecurity off;
            return 301 https://$host$request_uri;
        }
    }

    # -----------------------------------------------------------------------
    # Port 443: full WAF pipeline (ModSec + Lua + upstream).
    # Cert paths are populated by nginx/Dockerfile (self-signed) and can be
    # overridden in prod via the ./nginx/ssl volume — see README.
    # -----------------------------------------------------------------------
    server {
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate     /etc/ssl/waf.crt;
        ssl_certificate_key /etc/ssl/waf.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # -------------------------------------------------------------------
        # Health probe — never touched by ModSec or Lua.
        # -------------------------------------------------------------------
        location = /_waf/health {
            access_log off;
            modsecurity off;
            default_type application/json;
            return 200 '{"status":"ok"}';
        }

        # -------------------------------------------------------------------
        # Honeypot endpoints. Matched ahead of the generic access pipeline.
        # ModSec is disabled on these paths so the response we return is
        # exactly what the scanner sees — a real-looking 200/404, never a
        # 403 (a 403 would reveal the trap).
        # -------------------------------------------------------------------
        location ~ ^/(admin|wp-admin|wp-login\.php|\.env|\.git/config|phpmyadmin|actuator|console|manager/html)(/.*)?$ {
            access_log off;
            modsecurity off;
            access_by_lua_file /usr/local/openresty/nginx/lua/honeypot.lua;
        }

        # -------------------------------------------------------------------
        # Main pipeline:
        #   ModSec phases 1+2 → access_by_lua (decision_engine) → upstream
        #   → log_by_lua (request_logger publishes to waf:requests stream)
        # -------------------------------------------------------------------
        access_by_lua_file /usr/local/openresty/nginx/lua/decision_engine.lua;
        log_by_lua_file    /usr/local/openresty/nginx/lua/request_logger.lua;

        location / {
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            proxy_pass http://backend;
        }
    }
}
