# =============================================================================
# ModSecurity v3 — main configuration
# Phase 4: enforcement mode. Lua decision_engine runs in nginx access phase
# and reads the anomaly score this config exposes as X-Modsec-Score on the
# inbound request.
# =============================================================================

SecRuleEngine DetectionOnly

SecRequestBodyAccess On
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject

SecResponseBodyAccess Off
SecResponseBodyMimeType text/plain text/html text/xml application/json
SecResponseBodyLimit 524288
SecResponseBodyLimitAction ProcessPartial

SecTmpDir  /tmp/
SecDataDir /tmp/

SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/modsec/audit.log

SecArgumentSeparator &
SecCookieFormat 0
SecUnicodeMapFile /etc/modsecurity/unicode.mapping 20127
SecStatusEngine Off

SecPcreMatchLimit 100000
SecPcreMatchLimitRecursion 100000

# Paranoia level must be set BEFORE crs-setup.conf so CRS picks it up when it
# initialises tx.paranoia_level. PL2 catches significantly more attacks than
# PL1's defaults; the ML signal absorbs the extra false positives.
SecAction \
    "id:900000,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.blocking_paranoia_level=2,\
    setvar:tx.detection_paranoia_level=2"

# Load OWASP CRS
Include /etc/modsecurity/crs/crs-setup.conf
Include /etc/modsecurity/crs/rules/*.conf

# Custom rules: anomaly-score export + ML pre-allow shortcut. MUST come after
# CRS so they observe the final aggregated tx.anomaly_score.
Include /etc/modsecurity/modsec_custom_rules.conf
