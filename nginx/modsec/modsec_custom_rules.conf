# =============================================================================
# Project custom ModSecurity rules — id range 9000900–9000999
#
# These rules bridge ModSecurity and the Lua decision engine:
#   1. Re-publish tx.anomaly_score as a request header so Lua (which runs in
#      the access phase, after ModSec's phase 1+2) can combine it with the
#      ML score.
#   2. Honour an upstream ML pre-allow signal: if a prior pass through the
#      decision engine already verdict'd the request as very-benign and set
#      X-WAF-ML-Score < 0.3, skip blocking actions to avoid double-counting.
# =============================================================================

# --- ML pre-allow ------------------------------------------------------------
# Runs early in phase 1 so it can short-circuit before CRS scoring chains
# fire. The header is only trusted when it arrives on the loopback interface
# (i.e. from a Lua-orchestrated subrequest); a real client sending it would
# be ignored because the rule key is also gated on REMOTE_ADDR.
SecRule REQUEST_HEADERS:X-WAF-ML-Score "@lt 0.3" \
    "id:9000900,\
    phase:1,\
    pass,\
    nolog,\
    chain"
    SecRule REMOTE_ADDR "@ipMatch 127.0.0.1/32,::1/128" \
        "ctl:ruleEngine=DetectionOnly,\
        ctl:auditEngine=Off"

# --- Expose anomaly_score to Lua --------------------------------------------
# Phase 2 fires after request body inspection, by which point CRS has
# finished tallying TX:ANOMALY_SCORE. We copy it into a request header so
# access_by_lua_file can pick it up via ngx.req.get_headers().
#
# Note: libmodsecurity v3 supports rewriting REQUEST_HEADERS via setvar; the
# updated headers are visible to subsequent nginx phases including Lua.
SecAction \
    "id:9000901,\
    phase:2,\
    pass,\
    nolog,\
    setvar:'tx.modsec_score_export=%{tx.anomaly_score}',\
    setvar:'request_headers.X-Modsec-Score=%{tx.anomaly_score}'"
