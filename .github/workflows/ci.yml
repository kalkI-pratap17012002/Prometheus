name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check --ignore E501 ml_engine/ tools/

  ml-tests:
    name: ML train + evaluate
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml_engine/requirements.txt

      - name: Install ml_engine deps
        run: pip install -r ml_engine/requirements.txt

      - name: Train (fast mode)
        working-directory: ml_engine
        run: python train.py --fast

      - name: Evaluate + benchmark
        working-directory: ml_engine
        run: |
          python evaluate.py
          python - <<'PY'
          import json, sys
          from pathlib import Path
          report_path = Path("model/benchmark_report.json")
          assert report_path.exists(), "benchmark_report.json missing"
          report = json.loads(report_path.read_text())
          xgb = next(r for r in report["rows"] if r["model"] == "XGBoost")
          print(f"XGBoost F1 = {xgb['f1']:.4f}")
          assert xgb["f1"] > 0.95, f"XGBoost F1 {xgb['f1']:.4f} <= 0.95"
          PY

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: ml_engine/model/
          retention-days: 1

  integration:
    name: Docker integration
    runs-on: ubuntu-latest
    needs: ml-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Validate all Dockerfiles
        run: |
          status=0
          for df in $(find . -name 'Dockerfile*' -not -path '*/node_modules/*'); do
            echo "Checking $df ..."
            docker build --check -f "$df" "$(dirname "$df")" 2>&1 || {
              echo "WARNING: $df failed --check (non-fatal)"
            }
            # At minimum verify FROM instruction exists
            grep -qE '^FROM ' "$df" || { echo "ERROR: $df missing FROM"; status=1; }
          done
          exit $status

      - name: Verify service definitions
        run: |
          python3 -c "
          import yaml, sys
          with open('docker-compose.yml') as f:
              cfg = yaml.safe_load(f)
          services = list(cfg.get('services', {}).keys())
          expected = ['nginx', 'ml_engine', 'redis', 'postgres', 'influxdb',
                      'grafana', 'dashboard', 'threat_intel']
          missing = [s for s in expected if s not in services]
          if missing:
              print(f'Missing services: {missing}', file=sys.stderr)
              sys.exit(1)
          print(f'All {len(expected)} services defined: {services}')
          "

      - name: Install ml_engine deps and test deps
        run: |
          pip install -r ml_engine/requirements.txt
          pip install requests redis

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model
          path: ml_engine/model/

      - name: Smoke-test ml_engine imports
        working-directory: ml_engine
        run: |
          python -c "
          from main import app
          print(f'FastAPI app loaded: {app.title}')
          print(f'Routes: {[r.path for r in app.routes]}')
          "
