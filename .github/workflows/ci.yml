name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check --ignore E501 ml_engine/ tools/

  ml-tests:
    name: ML train + evaluate
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml_engine/requirements.txt

      - name: Install ml_engine deps
        run: pip install -r ml_engine/requirements.txt

      - name: Train (fast mode)
        working-directory: ml_engine
        run: python train.py --fast

      - name: Evaluate + benchmark
        working-directory: ml_engine
        run: |
          python evaluate.py
          python - <<'PY'
          import json, sys
          from pathlib import Path
          report_path = Path("model/benchmark_report.json")
          assert report_path.exists(), "benchmark_report.json missing"
          report = json.loads(report_path.read_text())
          xgb = next(r for r in report["rows"] if r["model"] == "XGBoost")
          print(f"XGBoost F1 = {xgb['f1']:.4f}")
          assert xgb["f1"] > 0.95, f"XGBoost F1 {xgb['f1']:.4f} <= 0.95"
          PY

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: ml_engine/model/
          retention-days: 1

  integration:
    name: Docker integration
    runs-on: ubuntu-latest
    needs: ml-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install host test deps
        run: pip install requests redis

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model
          path: ml_engine/model/

      - name: Provision .env for compose
        run: |
          if [ ! -f .env ] && [ -f .env.example ]; then
            cp .env.example .env
          fi

      - name: docker compose build
        run: docker compose build

      - name: docker compose up -d
        run: docker compose up -d

      - name: Wait for services to be healthy
        run: |
          for i in $(seq 1 30); do
            echo "--- attempt $i ---"
            docker compose ps
            bad=""
            for cid in $(docker compose ps -q); do
              name=$(docker inspect -f '{{.Name}}' "$cid" | sed 's|^/||')
              status=$(docker inspect -f '{{.State.Status}}' "$cid")
              health=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$cid")
              if [ "$health" = "none" ]; then
                [ "$status" = "running" ] || bad="$bad $name(status=$status)"
              else
                [ "$health" = "healthy" ] || bad="$bad $name(health=$health)"
              fi
            done
            if [ -z "$bad" ]; then
              echo "All services healthy."
              exit 0
            fi
            echo "Still waiting on:$bad"
            sleep 2
          done
          echo "Services failed to become healthy in time."
          docker compose ps
          exit 1

      - name: Run logger smoke test
        run: python tools/test_logger.py

      - name: Run decision-engine test
        run: python tools/test_decision_engine.py

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --tail=50

      - name: Tear down
        if: always()
        run: docker compose down -v
