name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check --ignore E501 ml_engine/ tools/

  ml-tests:
    name: ML train + evaluate
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml_engine/requirements.txt

      - name: Install ml_engine deps
        run: pip install -r ml_engine/requirements.txt

      - name: Train (fast mode)
        working-directory: ml_engine
        run: python train.py --fast

      - name: Evaluate + benchmark
        working-directory: ml_engine
        run: |
          python evaluate.py
          python - <<'PY'
          import json, sys
          from pathlib import Path
          report_path = Path("model/benchmark_report.json")
          assert report_path.exists(), "benchmark_report.json missing"
          report = json.loads(report_path.read_text())
          xgb = next(r for r in report["rows"] if r["model"] == "XGBoost")
          print(f"XGBoost F1 = {xgb['f1']:.4f}")
          assert xgb["f1"] > 0.95, f"XGBoost F1 {xgb['f1']:.4f} <= 0.95"
          PY

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: ml_engine/model/
          retention-days: 1

      - name: Smoke-test ml_engine imports
        working-directory: ml_engine
        run: |
          python -c "
          from main import app
          print(f'FastAPI app loaded: {app.title}')
          print(f'Routes: {[r.path for r in app.routes]}')
          "
